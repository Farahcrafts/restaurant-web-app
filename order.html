<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./assets/index-css/body.css" />
    <link rel="stylesheet" href="./assets/order-css/order-form.css" />
  </head>
  <body>
    <div class="comfirming-order-container">
      <div>
        <h1>Comfirm Your Order</h1>
      </div>
      <form name="comfirming-order-form" action="">
        <div class="comfirming-order-form-container">
          <div>
            <label for="customer-name">Name:</label>
            <input
              type="text"
              name="customer-name"
              id="customer-name"
              placeholder="Enter your name"
              required
              autofocus
            />
          </div>
          <div>
            <label for="customer-number">Phone Number:</label>
            <input
              type="text"
              name="customer-number"
              id="customer-number"
              placeholder="Enter your phone number"
              required
            />
          </div>
          <div>
            <label for="customer-adress">Delivery Adress:</label>
            <input
              type="text"
              name="customer-adress"
              id="customer-adress"
              placeholder="Enter your adress"
              required
            />
          </div>
        </div>
        <div>
          <button class="comfirm-order-btn">Comfirm the Order</button>
        </div>
      </form>
    </div>
  </body>
</html>
